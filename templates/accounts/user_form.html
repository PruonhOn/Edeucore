{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="breadcrumb-bar">
  <a href="{% url 'user_list' %}">Users</a> <i class="fas fa-chevron-right" style="font-size:10px;"></i> <span>{{ title }}</span>
</div>
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header"><i class="fas fa-user-plus me-2"></i>{{ title }}</div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            {% for field in form %}
            <div class="col-md-6">
              <label class="form-label">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger" style="font-size:12px;margin-top:4px;">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i>Save</button>
            <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
