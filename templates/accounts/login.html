{% extends 'base.html' %}
{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2044 0%,#1a3a6b 50%,#2255a4 100%);">
  <div style="width:100%;max-width:440px;padding:20px;position:relative;z-index:1;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:70px;height:70px;background:linear-gradient(135deg,#e8a020,#f4c56a);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px;box-shadow:0 8px 24px rgba(232,160,32,0.4);">🎓</div>
      <h1 style="font-family:'Sora',sans-serif;font-size:26px;font-weight:800;color:white;margin:0;">EduCore SMS</h1>
      <p style="color:rgba(255,255,255,0.6);font-size:14px;margin:6px 0 0;">School Management System</p>
    </div>
    <div style="background:white;border-radius:20px;padding:36px;box-shadow:0 24px 64px rgba(0,0,0,0.3);">
      <h2 style="font-size:20px;font-weight:700;color:#1a202c;margin-bottom:6px;">Welcome back</h2>
      <p style="color:#718096;font-size:13.5px;margin-bottom:28px;">Sign in to your account to continue</p>
      <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:18px;">
          <label style="display:block;font-weight:600;font-size:13px;color:#1a202c;margin-bottom:7px;">Username</label>
          <div style="position:relative;">
            <i class="fas fa-user" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#a0aec0;font-size:14px;"></i>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" style="padding-left:42px;" required>
          </div>
        </div>
        <div style="margin-bottom:24px;">
          <label style="display:block;font-weight:600;font-size:13px;color:#1a202c;margin-bottom:7px;">Password</label>
          <div style="position:relative;">
            <i class="fas fa-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#a0aec0;font-size:14px;"></i>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" style="padding-left:42px;" required>
          </div>
        </div>
        {% if messages %}{% for m in messages %}<div style="background:#fef2f2;color:#c53030;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;">{{ m }}</div>{% endfor %}{% endif %}
        <button type="submit" style="width:100%;padding:12px;background:linear-gradient(135deg,#1a3a6b,#2255a4);border:none;border-radius:10px;color:white;font-weight:700;font-size:15px;cursor:pointer;">Sign In &nbsp;<i class="fas fa-arrow-right"></i></button>
      </form>
      <p style="text-align:center;font-size:12px;color:#a0aec0;margin-top:24px;margin-bottom:0;">Demo: admin / admin123</p>
    </div>
  </div>
</div>
{% endblock %}
